{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}



    <style>
        /* Custom styles for the form */
        body {
            background-color: #f4f7fa;
            font-family: 'Arial', sans-serif;
        }

        .registration-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .registration-card {
            max-width: 450px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        .registration-card h4 {
            font-size: 1.75rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
        }

        .form-control {
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 1rem;
        }

        .btn-primary {
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 1.1rem;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .mt-3 {
            text-align: center;
        }


        .mt-3 a:hover {
            text-decoration: underline;
        }

        .alert {
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>

<body>

    <!-- Registration Form -->
    <div class="registration-container">
        <div class="registration-card shadow-sm">
            <h4>რეგისტრაცია</h4>

            <!-- Flash Message Display -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="alert alert-{{ messages[0][0] }}" role="alert">
                        {{ messages[0][1] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <!-- Username Input -->
                <div class="mb-3">
                    <label for="username" class="form-label">მომხმარებლის სახელი</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>

                <!-- Password Input -->
                <div class="mb-3">
                    <label for="password" class="form-label">პაროლი</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <!-- Email Input -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <!-- Submit Button -->
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">რეგისტრაცია</button>
                </div>

                <!-- Login Link -->
                <p class="mt-3">უკვე გაქვთ ექაუნთი? <a href="{{ url_for('login') }}">შედით აქედან</a></p>
            </form>
        </div>
    </div>



{% endblock %}
